kind = "web"
previewPath = "/"
title = "EstimatorPro"
version = "1.0.0"
id = "artifacts/estimatorpro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22800
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/estimatorpro run dev"

[services.env]
PORT = "22800"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/estimatorpro", "run", "build"]
publicDir = "artifacts/estimatorpro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
